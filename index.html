<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#0fbf9f">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>ResumeMD｜Markdown 简历生成器</title>
  <link rel="stylesheet" href="css/app.css">

  <link id="print-styles" rel="stylesheet" href="css/print.css" media="print">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <a class="brand" href="#editor-panel" aria-label="ResumeMD 首页">
        <span class="brand-mark" aria-hidden="true"><span></span></span>
        <span class="brand-copy">
          <strong>ResumeMD</strong>
          <small>Markdown 简历生成器</small>
        </span>
      </a>

      <nav class="toolbar" aria-label="简历操作">
        <button class="toolbar-button" id="reset-button" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.6 9a8 8 0 1 1 .1 6.2M4.6 9V4.8M4.6 9h4.2"/></svg>
          <span>示例</span>
        </button>
        <button class="toolbar-button" id="clear-button" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M8 6V4h8v2m-9 0 1 15h8l1-15M10 11v6M14 11v6"/></svg>
          <span>清空</span>
        </button>
        <button class="toolbar-button" id="import-button" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 19h14"/></svg>
          <span>导入</span>
        </button>
        <button class="toolbar-button" id="export-button" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 16V4m0 0 4 4m-4-4-4 4M5 20h14"/></svg>
          <span>导出 MD</span>
        </button>
        <button class="toolbar-button toolbar-button-primary" id="print-button" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 8V3h10v5M7 17H5a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2M7 14h10v7H7z"/></svg>
          <span>打印 / PDF</span>
        </button>
      </nav>
    </header>

    <div class="mobile-tabs" role="tablist" aria-label="移动端视图切换">
      <button class="mobile-tab is-active" id="editor-tab" type="button" role="tab" aria-selected="true" aria-controls="editor-panel">编辑</button>
      <button class="mobile-tab" id="preview-tab" type="button" role="tab" aria-selected="false" aria-controls="preview-panel">预览</button>
    </div>

    <main class="workspace" data-mobile-view="editor">
      <section class="editor-pane" id="editor-panel" aria-labelledby="editor-title">
        <div class="pane-header">
          <div>
            <p class="pane-kicker">SOURCE</p>
            <h1 id="editor-title">Markdown 编辑器</h1>
          </div>
          <div class="editor-tools">
            <label class="visually-hidden" for="snippet-select">插入简历模板</label>
            <select class="compact-select" id="snippet-select" aria-label="插入简历模板">
              <option value="">插入模板</option>
              <option value="profile">个人信息</option>
              <option value="education">教育背景</option>
              <option value="experience">实习经历</option>
              <option value="project">项目经历</option>
              <option value="skills">技能特长</option>
              <option value="awards">荣誉奖项</option>
            </select>
            <div class="document-status" id="document-status" aria-live="polite">准备就绪</div>
          </div>
        </div>

        <div class="error-panel" id="error-panel" role="status" aria-live="polite" hidden></div>

        <label class="visually-hidden" for="markdown-editor">Markdown 简历内容</label>
        <textarea id="markdown-editor" spellcheck="false" autocomplete="off" autocapitalize="off" aria-describedby="editor-hint"></textarea>

        <footer class="editor-footer">
          <span id="editor-hint">Front Matter 管理个人信息，正文使用 Markdown。</span>
          <span class="resume-stats" id="resume-stats" aria-live="polite">
            <span id="character-count">0 字符</span>
            <span>0 模块</span>
            <span>1 页</span>
          </span>
        </footer>
      </section>

      <section class="preview-pane" id="preview-panel" aria-labelledby="preview-title">
        <div class="preview-topbar">
          <div>
            <p class="pane-kicker">PREVIEW</p>
            <h2 id="preview-title">A4 实时预览</h2>
          </div>
          <div class="preview-tools">
            <span class="preview-badge" id="page-count">1 页</span>
            <label class="visually-hidden" for="zoom-select">预览缩放</label>
            <select class="compact-select compact-select-dark" id="zoom-select" aria-label="预览缩放">
              <option value="0.85">85%</option>
              <option value="1" selected>100%</option>
              <option value="1.15">115%</option>
            </select>
          </div>
        </div>
        <div class="preview-scroll">
          <div class="resume-document" id="resume-preview" aria-label="简历预览"></div>
        </div>
      </section>
    </main>
  </div>

  <input id="file-input" type="file" accept=".md,.markdown,.txt,text/markdown,text/plain" hidden>
